<body>
    <div class="center">
        <p style="text-align:left">
            <font color="#FFFFFF" face="MS Gothic">
                By the time I came back to Virginia, <br/>
                the cicadas were gone.<br/>
                <br/>
                17 years of anticipation had past,<br/>
                but I returned to nothing but silence.<br/>
                <br/>
                So I left and heard them elsewhere,<br/>
                in places never expected.<br/>
            </font>
        </p> 
    </div>
